name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Format, lint, and test on both platforms. The Windows job is the one that
  # matters most for the production backend: `cargo test` there runs the
  # integration suite, which spawns the cavia and reads a real Windows process
  # through `WindowsBackend` — the acceptance proof for issue #4.
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    # A normal run finishes in a couple of minutes; cap it so a stalled runner
    # (a hung compile/link) fails fast instead of burning ~45 min, as one i686
    # build once did, before anyone can react.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup update stable
          rustup default stable
          rustup component add rustfmt clippy

      - uses: Swatinem/rust-cache@v2

      # Formatting is line-ending sensitive; check it once, on Linux.
      - name: Formatting
        if: runner.os == 'Linux'
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all-targets

      # The offline authoring tools (IL2CPP -> profile converter) live behind a
      # non-default feature so the runtime stays tiny; test that path explicitly.
      - name: Test (authoring tools)
        run: cargo test --all-targets --features authoring

      - name: Doc tests
        run: cargo test --doc --all-features

  # Prove the 32-bit (WOW64) read path at runtime, not just at compile time:
  # build and run the whole integration suite as a 32-bit process reading a
  # 32-bit cavia. Covers the "32-bit and 64-bit targets both handled" criterion.
  windows-32bit:
    name: test (windows, 32-bit)
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (i686)
        run: |
          rustup update stable
          rustup default stable
          rustup target add i686-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
      - name: Test (i686)
        run: cargo test --all-targets --target i686-pc-windows-msvc

  # Build the shippable CLI. The uploaded artifacts are exactly what you drop on
  # a Windows box to test the engine against a game *without* this pipeline:
  # `scry.exe` (the host) and `cavia.exe` (the bundled selftest target).
  windows-cli:
    name: cli (${{ matrix.target }})
    runs-on: windows-latest
    timeout-minutes: 25
    needs: test
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-pc-windows-msvc, i686-pc-windows-msvc]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (${{ matrix.target }})
        run: |
          rustup update stable
          rustup default stable
          rustup target add ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      # `--features authoring` so the gated `il2cpp2scry` converter is built too:
      # a no-toolchain author downloads all three (host, selftest cavia, and the
      # IL2CPP→profile converter) and never needs Rust.
      - name: Build release binaries
        run: cargo build --release --bins --features authoring --target ${{ matrix.target }}
      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: scry-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/scry.exe
            target/${{ matrix.target }}/release/cavia.exe
            target/${{ matrix.target }}/release/il2cpp2scry.exe
          if-no-files-found: error
